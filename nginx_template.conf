server {
    listen 80;
    server_name {domain};

    # Frontend: Statik fayllar
    location / {
        root {workdir}/frontend;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Backend: API va Webhook so'rovlari
    location ~ ^/(api|webhook|docs|openapi.json) {
        # Oxiridagi "/" belgisi Nginx-ga kelgan URL boshidagi 
        # mos tushgan qismni (prefiksni) olib tashlashni buyuradi.
        proxy_pass http://127.0.0.1:8000/{name}$request_uri;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}