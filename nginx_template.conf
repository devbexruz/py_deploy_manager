server {
    listen 80;
    server_name {domain};

    # Frontend
    {frontend_location}

    # Backend
    # 1-QOIDA: Agar so'rov allaqachon prefiksga ega bo'lsa (Swagger yuborgandek)
    # Hech qanday o'zgarishsiz, o'zini qanday bo'lsa shunday uzatamiz.
    location /{package_name}/{backend_prefix}/ {
        proxy_pass http://127.0.0.1:8000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 2-QOIDA: Agar so'rov toza kelsa (masalan shunchaki /docs deb kirsangiz)
    # Boshiga prefiksni qo'shib, ichkariga otamiz.
    # backend_prefix -> masalan: api/
    location /{backend_prefix} {
        # Kelgan so'rovni (masalan /docs) ichkariga /{package_name}/docs qilib o'zgartiradi
        # "break" buyrug'i bu jarayonni takrorlanishdan saqlaydi (duplikat bo'lmaydi)
        rewrite ^/(.*)$ /{package_name}/$1 break;

        # O'zgartirilgan so'rovni uvicorn (manager_app) manziliga yuborish
        proxy_pass http://127.0.0.1:8000;
        
        # Standart proxy sarlavhalari (FastAPI hammasini to'g'ri anglashi uchun)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}