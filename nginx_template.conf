server {
    listen 80;
    server_name {domain};

    # Frontend: Statik fayllar
    location / {
        root {workdir}/frontend;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Backend: API va Webhook
    location ~ ^/(api|webhook|docs|openapi.json) {
        # Diqqat qiling: Port oxiriga "/" belgisini qo'ydik! 
        # Bu Nginx'ga URL'dan so'rov qismini qirqib olishni buyuradi.
        proxy_pass http://127.0.0.1:8000/{name}/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # FastAPI loyiha o'z ruterlarini to'g'ri qurishi uchun prefiksni bildiramiz
        proxy_set_header X-Forwarded-Prefix /{name};
    }
}